{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ajouter Producteur</title>

<link rel="stylesheet" href="{% static 'output.css' %}">
</head>

<body class="min-h-screen overflow-auto">

<!-- VIDEO BACKGROUND -->
<video autoplay muted loop playsinline
class="fixed top-0 left-0 w-full h-full object-cover -z-10">
<source src="{% static 'videos/agriculture.mp4' %}" type="video/mp4">
</video>


 <!-- HEADER -->
<header class="fixed top-0 left-0 w-full z-50">

  <!-- Barre principale -->
  <div class="mx-2 sm:mx-4 mt-3 rounded-xl sm:rounded-2xl bg-white/5 backdrop-blur-xl border border-white/10 shadow-[0_8px_32px_rgba(0,0,0,0.4)]">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-2 sm:py-3 flex items-center justify-between">

      <!-- Logo -->
      <div class="flex items-center gap-2 sm:gap-3">
        <div class="w-7 h-7 sm:w-9 sm:h-9 bg-gradient-to-br from-green-400 to-green-700 rounded-xl flex items-center justify-center text-base shadow-lg shadow-green-900/40">
          
        </div>
        <div class="flex flex-col leading-none">
          <span class="font-bold text-white text-sm sm:text-base tracking-tight">AgriCam</span>
          <span class="text-green-400 text-[8px] sm:text-[10px] font-medium tracking-widest uppercase">Platform</span>
        </div>
      </div>

      <!-- Navigation centrale -->
      <nav class="hidden md:flex items-center gap-1 bg-white/5 rounded-xl px-2 py-1 border border-white/10">
        <a href="{% url 'home' %}" class="text-white/70 text-xs font-medium px-3 sm:px-4 py-2 rounded-lg hover:bg-white/10 hover:text-white transition-all duration-200 no-underline">
          Accueil
        </a>
        <a href="{% url 'ajouter_recolte' %}" class="text-white/70 text-xs font-medium px-3 sm:px-4 py-2 rounded-lg hover:bg-white/10 hover:text-white transition-all duration-200 no-underline">
          Collecte
        </a>
        <a href="{% url 'liste_producteurs' %}" class="text-white/70 text-xs font-medium px-3 sm:px-4 py-2 rounded-lg hover:bg-white/10 hover:text-white transition-all duration-200 no-underline">
          Producteurs
        </a>
        <a href="{% url 'analyses' %}" class="text-white/70 text-xs font-medium px-3 sm:px-4 py-2 rounded-lg hover:bg-white/10 hover:text-white transition-all duration-200 no-underline">
          Analyses
        </a>
      </nav>

      <!-- Droite : badge + bouton -->
      <div class="flex items-center gap-2 sm:gap-3">

        <!-- Badge statut -->
        <div class="hidden md:flex items-center gap-2 bg-green-500/10 border border-green-500/20 rounded-full px-3 py-1">
          <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
          <span class="text-green-400 text-[11px] font-medium">En ligne</span>
        </div>

        <!-- Bouton CTA -->
        <a href="{% url 'ajouter_recolte' %}" class="no-underline">
          <button class="flex items-center gap-1 sm:gap-2 bg-gradient-to-r from-green-500 to-green-600 hover:from-green-400 hover:to-green-500 text-white text-xs font-bold px-3 sm:px-5 py-2 sm:py-2.5 rounded-xl transition-all duration-200 hover:scale-105 shadow-lg shadow-green-900/40">
            <span>+</span>
            <span class="hidden sm:inline">Collecter</span>
            <span class="sm:hidden">Coll.</span>
          </button>
        </a>

         <!-- Bouton  Retour-->
        <a href="{% url 'home' %}" class="no-underline">
          <button class="flex items-center gap-1 sm:gap-2 bg-gradient-to-r from-green-500 to-green-600 hover:from-green-400 hover:to-green-500 text-white text-xs font-bold px-3 sm:px-5 py-2 sm:py-2.5 rounded-xl transition-all duration-200 hover:scale-105 shadow-lg shadow-green-900/40">
            <span>+</span>
            <span class="hidden sm:inline">Retour</span>
            <span class="sm:hidden">Coll.</span>
          </button>
        </a>

      </div>
    </div>
  </div>
</header>
 

<div class="h-32"></div>


<!-- FORMULAIRE -->
<section class="relative z-10 flex justify-center px-6 py-10">

<div class="w-full max-w-4xl
bg-white/10 backdrop-blur-xl
border border-white/20
rounded-3xl shadow-2xl p-12">

<h2 class="text-4xl font-bold text-white text-center mb-3">
Nouveau Producteur
</h2>

<p class="text-center text-gray-200 mb-12">
Enregistrer un producteur agricole
</p>



<form method="POST" class="space-y-10">
{% csrf_token %}


<div class="grid md:grid-cols-2 gap-8">

<!-- Nom -->
<div class="bg-white/10 backdrop-blur-xl
border border-white/30
rounded-2xl p-7 shadow-xl
hover:border-green-400 transition">

<label class="block text-green-300 font-semibold mb-3">
{{ form.nom.label }}
</label>

<div class="bg-black/20 rounded-xl p-4 border border-white/20">
{{ form.nom }}
</div>

</div>



<!-- Région -->
<div class="bg-white/10 backdrop-blur-xl
border border-white/30
rounded-2xl p-7 shadow-xl
hover:border-green-400 transition">

<label class="block text-green-300 font-semibold mb-3">
{{ form.region.label }}
</label>

<div class="bg-black/20 rounded-xl p-4 border border-white/20">
{{ form.region }}
</div>

</div>

</div>



<!-- Contact pleine largeur -->
<div class="bg-white/10 backdrop-blur-xl
border border-white/30
rounded-2xl p-7 shadow-xl
hover:border-green-400 transition">

<label class="block text-green-300 font-semibold mb-3">
{{ form.contact.label }}
</label>

<div class="bg-black/20 rounded-xl p-4 border border-white/20">
{{ form.contact }}
</div>

</div>



<!-- boutons -->
<div class="flex gap-6 pt-6">

<button type="submit"
class="flex-1 bg-green-600 hover:bg-green-500
py-4 rounded-2xl
text-white font-bold shadow-xl
hover:scale-105 transition">

Enregistrer

</button>


<button type="reset"
class="flex-1 bg-red-500 hover:bg-red-400
py-4 rounded-2xl
text-white font-bold shadow-xl
hover:scale-105 transition">

Annuler

</button>

</div>


</form>

</div>

</section>



<!-- FOOTER -->
<footer class="mt-14 bg-white/10 backdrop-blur-md border-t border-white/20 py-8 text-center text-gray-300">
INF232 EC2 • Gestion des Producteurs
</footer>


</body>
</html>
